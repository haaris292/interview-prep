<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Interview Prep</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header class="hero">

    <div class="hero-content">

        <h1>🚀 Interview Prep</h1>

        <p>

            Azure • Terraform • Docker • Kubernetes • DevOps

        </p>

        <input
            id="searchTopics"
            type="text"
            placeholder="Search topics..."
        >

    </div>

</header>

<main class="container">

    <section class="stats">

        <div class="stat-card">

            <h2 id="topicCount">0</h2>

            <p>Topics</p>

        </div>

        <div class="stat-card">

            <h2 id="questionCount">0</h2>

            <p>Questions</p>

        </div>

    </section>

    <section>

        <h2 class="section-title">

            Browse Topics

        </h2>

        <div id="topics"
             class="topics-grid">

        </div>

    </section>

</main>

<footer>

    <p>

        Built by HK wstd using HTML, CSS & JavaScript

    </p>

</footer>

<script src="js/app.js"></script>

</body>

</html>
